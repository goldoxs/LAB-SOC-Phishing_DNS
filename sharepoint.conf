<VirtualHost *:80>
    ServerName sharepoint.webhop.me
    ProxyPreserveHost On

    # Redirige / directement vers /login.html en interne
    RewriteEngine On
    RewriteRule ^/$ /login.html [P,L]

    ProxyPass / http://127.0.0.1:8099/
    ProxyPassReverse / http://127.0.0.1:8099/

    ErrorLog ${APACHE_LOG_DIR}/sharepoint_error.log
    CustomLog ${APACHE_LOG_DIR}/sharepoint_access.log combined
</VirtualHost>